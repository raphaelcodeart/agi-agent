user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access_log.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Gzip Compression
    gzip on;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Next.js Dashboard Host
    server {
        listen 80;
        server_name app.example.com localhost;

        client_max_body_size 10M;

        location / {
            proxy_pass http://dashboard:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for Next.js hot reloading
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # FastAPI API Host
    server {
        listen 80;
        server_name api.example.com;

        client_max_body_size 100M; # allow larger media uploads

        location / {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket or Server-Sent Events readiness
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }

    # Media Storage Server
    server {
        listen 80;
        server_name media.example.com;

        # Disable directory listing
        autoindex off;

        location / {
            root /storage;
            
            # Add CORS header so the Next.js app can fetch and preview media if needed
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS';
            add_header Access-Control-Allow-Headers 'Range';

            # Enable byte-range support for video seeking
            types {
                video/mp4 mp4;
                video/webm webm;
                image/jpeg jpeg jpg;
                image/png png;
                image/gif gif;
                image/webp webp;
            }

            # Cache headers
            expires 30d;
            add_header Cache-Control "public, no-transform";
            
            # Range requests configuration
            max_ranges 0; # Disable if we want to limit, but standard range requests are processed by nginx default
        }
    }
}
