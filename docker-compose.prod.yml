version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: social_publisher_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: social_publisher_redis_prod
    restart: always
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: social_publisher_api_prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - media_storage_prod:/storage
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: social_publisher_worker_prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - media_storage_prod:/storage
    command: celery -A app.workers.celery_app.celery worker --loglevel=warning -c 4

  beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: social_publisher_beat_prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - media_storage_prod:/storage
    command: celery -A app.workers.celery_app.celery beat --loglevel=warning

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      target: production
    container_name: social_publisher_dashboard_prod
    restart: always
    depends_on:
      - api
    env_file:
      - .env
    environment:
      # Server-side origin used by the dashboard's BFF routes/middleware to reach
      # the api container directly over the Docker network.
      - API_INTERNAL_URL=http://api:8000

  nginx:
    image: nginx:1.25-alpine
    container_name: social_publisher_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - dashboard
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - media_storage_prod:/storage:ro

volumes:
  postgres_data_prod:
  redis_data_prod:
  media_storage_prod:
